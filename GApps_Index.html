<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Empréstimo Express</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- React & Lucide icons -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        /* INSERINDO O DESIGN PREMIUM (CSS) */
        :root {
            --primary-500: #6366f1; --primary-600: #4f46e5;
            --accent-400: #34d399; --accent-500: #10b981;
            --warn-400: #f87171; --warn-500: #ef4444;
            --bg-body: #0a0e1a; --bg-surface: #111827;
            --bg-card: rgba(17, 24, 39, 0.65);
            --text-primary: #f9fafb; --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --radius-md: 12px; --radius-lg: 16px;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --transition-base: 250ms ease;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-body); color: var(--text-primary);
            overflow-x: hidden;
            background-image: 
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 90%, rgba(16, 185, 129, 0.06) 0%, transparent 60%);
        }

        .app-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px; background: rgba(17, 24, 39, 0.8);
            border-right: 1px solid var(--border-subtle);
            padding: 24px; display: flex; flex-direction: column;
            position: fixed; height: 100vh;
        }

        .main-content { flex: 1; margin-left: 260px; padding: 40px; }

        .glass-card {
            background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg); padding: 24px;
            transition: all var(--transition-base);
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
        
        .stat-card {
            padding: 20px; border-radius: var(--radius-md); background: var(--bg-card);
            border-top: 3px solid var(--primary-500);
        }
        .stat-card.accent { border-top-color: var(--accent-500); }
        .stat-card.warn { border-top-color: var(--warn-500); }

        .btn {
            background: var(--primary-500); color: #fff; padding: 10px 20px;
            border-radius: 8px; border: none; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-accent { background: var(--accent-500); }
        .btn-danger { background: var(--warn-500); }
        .btn-ghost { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-secondary); }

        .nav-item {
            padding: 12px 16px; border-radius: 8px; cursor: pointer;
            color: var(--text-secondary); display: flex; align-items: center; gap: 12px;
            transition: 0.2s; margin-bottom: 4px;
        }
        .nav-item.active { background: rgba(99, 102, 241, 0.15); color: #fff; }

        /* Loader */
        .loader-overlay {
            position: fixed; inset: 0; background: var(--bg-body);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--border-subtle);
            border-top-color: var(--primary-500); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tables & Lists */
        .table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .table th { text-align: left; padding: 12px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        .table td { padding: 12px; border-bottom: 1px solid var(--border-subtle); }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--accent-400); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: var(--warn-400); }

        /* Filters */
        .filter-tabs { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
        .filter-tab {
            padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.05);
            border: none; color: var(--text-secondary); cursor: pointer; white-space: nowrap;
        }
        .filter-tab.active { background: var(--primary-500); color: #fff; }

        /* Modal placeholder */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: var(--bg-surface); padding: 32px; border-radius: var(--radius-lg);
            width: 90%; max-width: 500px;
        }
        .form-group { margin-bottom: 16px; }
        .label { display: block; margin-bottom: 4px; color: var(--text-muted); font-size: 0.8rem; }
        .input { width: 100%; padding: 10px; background: #0a0e1a; border: 1px solid var(--border-subtle); border-radius: 6px; color: #fff; box-sizing: border-box;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // MOCK LOCAL (Permite abrir dando dois cliques no computador sem erro)
        if (typeof google === 'undefined') {
            window.google = {
                script: {
                    run: {
                        withSuccessHandler: function(callback) {
                            return {
                                getAllData: () => setTimeout(() => callback({clients: [], loans: [], transactions: []}), 500),
                                saveData: () => setTimeout(() => callback(), 500),
                                updateInstallments: () => setTimeout(() => callback(), 500)
                            };
                        }
                    }
                }
            };
        }

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [page, setPage] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [clients, setClients] = useState([]);
            const [loans, setLoans] = useState([]);
            const [transactions, setTransactions] = useState([]);

            useEffect(() => {
                refreshData(true);
                // Sincronização automática para que os outros usuários vejam as alterações (a cada 10 segundos)
                const interval = setInterval(() => {
                    refreshData(false);
                }, 10000);
                return () => clearInterval(interval);
            }, []);

            const refreshData = (showLoading = true) => {
                if (showLoading && clients.length === 0) setLoading(true); // Evita piscar a tela
                
                // Chama o backend (Google Apps Script)
                google.script.run.withSuccessHandler((data) => {
                    setClients(data.clients);
                    setLoans(data.loans);
                    setTransactions(data.transactions);
                    setLoading(false);
                }).getAllData();
            };

            // Funções de salvamento (proxies para o GAS)
            const handleSaveTransaction = (t) => {
                setLoading(true);
                google.script.run.withSuccessHandler(() => refreshData(true)).saveData('transacoes', t);
            };

            const handleTogglePaid = (loanId, index, paid) => {
                const loan = loans.find(l => l.id === loanId);
                const newInst = [...loan.installments];
                newInst[index].paid = !paid;
                newInst[index].paidDate = !paid ? new Date().toISOString() : null;
                
                setLoading(true);
                google.script.run.withSuccessHandler(() => refreshData(true)).updateInstallments(loanId, newInst);
            };

            if (loading && clients.length === 0) {
                return (
                    <div className="loader-overlay">
                        <div className="spinner"></div>
                        <p style={{marginLeft: 16}}>Sincronizando com Google Sheets...</p>
                    </div>
                );
            }

            return (
                <div className="app-container">
                    <div className="sidebar">
                        <h2 style={{fontSize: '1.2rem', marginBottom: 32}}>Empréstimo Express</h2>
                        <div className={`nav-item ${page === 'dashboard' ? 'active' : ''}`} onClick={() => setPage('dashboard')}>
                            <lucide.LayoutDashboard size={18} /> Painel
                        </div>
                        <div className={`nav-item ${page === 'cobrancas' ? 'active' : ''}`} onClick={() => setPage('cobrancas')}>
                            <lucide.CalendarRange size={18} /> Cobranças
                        </div>
                        <div className={`nav-item ${page === 'clientes' ? 'active' : ''}`} onClick={() => setPage('clientes')}>
                            <lucide.Users size={18} /> Clientes
                        </div>
                        <div className={`nav-item ${page === 'financeiro' ? 'active' : ''}`} onClick={() => setPage('financeiro')}>
                            <lucide.LineChart size={18} /> Financeiro
                        </div>

                        {loading && <div style={{marginTop: 'auto', textAlign: 'center', color: 'var(--accent-400)', fontSize: '0.8rem'}}>Atualizando...</div>}
                    </div>

                    <div className="main-content">
                        {page === 'dashboard' && <Dashboard loans={loans} transactions={transactions} clients={clients} onToggle={handleTogglePaid} />}
                        {page === 'cobrancas' && <Cobrancas loans={loans} clients={clients} onToggle={handleTogglePaid} />}
                        {page === 'clientes' && <Clientes loans={loans} clients={clients} refresh={refreshData} />}
                        {page === 'financeiro' && <Financeiro transactions={transactions} loans={loans} refresh={refreshData} />}
                    </div>
                </div>
            );
        }

        // --- COMPONENTE DASHBOARD ---
        function Dashboard({ loans, transactions, clients, onToggle }) {
            const stats = useMemo(() => {
                const totalLent = loans.reduce((sum, l) => sum + Number(l.loanAmount), 0);
                const totalAportes = transactions.filter(t => t.type === 'aporte').reduce((sum, t) => sum + Number(t.amount), 0);
                const totalRetiradas = transactions.filter(t => t.type === 'retirada').reduce((sum, t) => sum + Number(t.amount), 0);
                
                let received = 0;
                let pending = 0;
                loans.forEach(l => {
                    l.installments.forEach(i => {
                        if (i.paid) received += i.value;
                        else pending += i.value;
                    });
                });

                const balance = totalAportes - totalRetiradas - totalLent + received;
                const totalForecast = balance + pending;

                return { balance, totalLent, received, totalForecast, pending };
            }, [loans, transactions]);

            const todayStr = new Date().toISOString().split('T')[0];
            const todayInstallments = useMemo(() => {
                const results = [];
                loans.forEach(l => {
                    l.installments.forEach((inst, idx) => {
                        if (inst.date === todayStr) {
                            const c = clients.find(cl => cl.id === l.clientId);
                            results.push({ ...inst, loanId: l.id, index: idx, clientName: c?.name });
                        }
                    });
                });
                return results;
            }, [loans, clients, todayStr]);

            return (
                <div className="animate-fade-in">
                    <h1 style={{marginBottom: 32}}>Painel de Controle</h1>
                    <div className="stats-grid">
                        <div className="stat-card accent">
                            <span className="label">Caixa Atual</span>
                            <div style={{fontSize: '1.5rem', fontWeight: 800}}>{formatCurrency(stats.balance)}</div>
                        </div>
                        <div className="stat-card">
                            <span className="label">Caixa Previsto Final</span>
                            <div style={{fontSize: '1.5rem', fontWeight: 800, color: 'var(--primary-500)'}}>{formatCurrency(stats.totalForecast)}</div>
                        </div>
                        <div className="stat-card">
                            <span className="label">Emprestado</span>
                            <div style={{fontSize: '1.5rem', fontWeight: 800}}>{formatCurrency(stats.totalLent)}</div>
                        </div>
                        <div className="stat-card warn">
                            <span className="label">Pendências Hoje</span>
                            <div style={{fontSize: '1.5rem', fontWeight: 800}}>{todayInstallments.filter(i => !i.paid).length}</div>
                        </div>
                    </div>

                    <div className="glass-card">
                        <h3>Cobranças de Hoje</h3>
                        <table className="table">
                            <thead>
                                <tr><th>Cliente</th><th>Valor</th><th>Status</th><th>Pagar</th></tr>
                            </thead>
                            <tbody>
                                {todayInstallments.map(i => (
                                    <tr key={`${i.loanId}-${i.index}`}>
                                        <td>{i.clientName}</td>
                                        <td>{formatCurrency(i.value)}</td>
                                        <td>{i.paid ? <span className="badge badge-success">Pago</span> : <span className="badge badge-danger">Pendente</span>}</td>
                                        <td><input type="checkbox" checked={i.paid} onChange={() => onToggle(i.loanId, i.index, i.paid)} /></td>
                                    </tr>
                                ))}
                                {todayInstallments.length === 0 && <tr><td colSpan="4" style={{textAlign: 'center', padding: 24, color: 'var(--text-muted)'}}>Tudo limpo por hoje!</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- COMPONENTE COBRANÇAS ---
        function Cobrancas({ loans, clients, onToggle }) {
            const [filter, setFilter] = useState('today');
            const todayStr = new Date().toISOString().split('T')[0];

            const installments = useMemo(() => {
                const all = [];
                loans.forEach(l => {
                    const c = clients.find(cl => cl.id === l.clientId);
                    l.installments.forEach((inst, idx) => {
                        all.push({...inst, loanId: l.id, index: idx, clientName: c?.name, guarantee: l.guaranteeItem});
                    });
                });
                return all;
            }, [loans, clients]);

            const filtered = installments.filter(i => {
                if (filter === 'today') return i.date === todayStr;
                if (filter === 'overdue') return i.date < todayStr && !i.paid;
                if (filter === 'future') return i.date > todayStr && !i.paid;
                if (filter === 'paid') return i.paid;
                return true;
            }).sort((a,b) => a.date.localeCompare(b.date));

            return (
                <div className="animate-fade-in">
                    <h1 style={{marginBottom: 32}}>Controle de Cobranças</h1>
                    <div className="filter-tabs">
                        <button className={`filter-tab ${filter === 'today' ? 'active' : ''}`} onClick={() => setFilter('today')}>Hoje</button>
                        <button className={`filter-tab ${filter === 'overdue' ? 'active' : ''}`} onClick={() => setFilter('overdue')}>Atrasadas</button>
                        <button className={`filter-tab ${filter === 'future' ? 'active' : ''}`} onClick={() => setFilter('future')}>Futuras</button>
                        <button className={`filter-tab ${filter === 'paid' ? 'active' : ''}`} onClick={() => setFilter('paid')}>Pagas</button>
                    </div>

                    <div className="glass-card">
                        <table className="table">
                            <thead>
                                <tr><th>Data</th><th>Cliente</th><th>Ref.</th><th>Valor</th><th>Ação</th></tr>
                            </thead>
                            <tbody>
                                {filtered.map(i => (
                                    <tr key={`${i.loanId}-${i.index}`}>
                                        <td style={{fontSize: '0.8rem'}}>{i.date.split('-').reverse().join('/')}</td>
                                        <td style={{fontWeight: 700}}>{i.clientName}</td>
                                        <td style={{fontSize: '0.8rem', color: 'var(--text-muted)'}}>{i.guarantee}</td>
                                        <td style={{color: 'var(--accent-400)', fontWeight: 800}}>{formatCurrency(i.value)}</td>
                                        <td><input type="checkbox" checked={i.paid} onChange={() => onToggle(i.loanId, i.index, i.paid)} /></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- COMPONENTE CLIENTES ---
        function Clientes({ loans, clients, refresh }) {
            const [showModal, setShowModal] = useState(false);
            const [form, setForm] = useState({ name: '', phone: '', cpf: '' });

            const handleSave = (e) => {
                e.preventDefault();
                const newClient = {
                    id: 'C-' + Date.now(),
                    name: form.name, phone: form.phone, cpf: form.cpf,
                    createdAt: new Date().toISOString()
                };
                google.script.run.withSuccessHandler(() => {
                    setShowModal(false);
                    refresh();
                }).saveData('clientes', newClient);
            };

            return (
                <div>
                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 32}}>
                        <h1>Clientes</h1>
                        <button className="btn" onClick={() => setShowModal(true)}><lucide.UserPlus size={18}/> Novo Cliente</button>
                    </div>
                    
                    <div className="stats-grid">
                        {clients.map(c => {
                            const cLoans = loans.filter(l => l.clientId === c.id);
                            return (
                                <div key={c.id} className="glass-card">
                                    <div style={{display: 'flex', justifyContent: 'space-between'}}>
                                        <div>
                                            <div style={{fontWeight: 800, fontSize: '1.1rem'}}>{c.name}</div>
                                            <div style={{fontSize: '0.8rem', color: 'var(--text-muted)'}}>{c.phone}</div>
                                        </div>
                                        <div className="badge badge-success">{cLoans.length} Empr.</div>
                                    </div>
                                    <button className="btn btn-ghost" style={{width: '100%', marginTop: 16, fontSize: '0.7rem'}}>Ver Detalhes</button>
                                </div>
                            );
                        })}
                    </div>

                    {showModal && (
                        <div className="modal">
                            <div className="modal-content glass-card">
                                <h2>Novo Cliente</h2>
                                <form onSubmit={handleSave}>
                                    <div className="form-group">
                                        <label className="label">Nome Completo</label>
                                        <input className="input" required value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label className="label">Telefone</label>
                                        <input className="input" placeholder="(00) 00000-0000" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label className="label">CPF</label>
                                        <input className="input" placeholder="000.000.000-00" value={form.cpf} onChange={e => setForm({...form, cpf: e.target.value})} />
                                    </div>
                                    <div style={{display: 'flex', gap: 8, marginTop: 24}}>
                                        <button className="btn btn-ghost" type="button" onClick={() => setShowModal(false)}>Cancelar</button>
                                        <button className="btn" type="submit">Cadastrar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- COMPONENTE FINANCEIRO ---
        function Financeiro({ transactions, loans, refresh }) {
            const [showModal, setShowModal] = useState(false);
            const [type, setType] = useState('aporte');
            const [form, setForm] = useState({ amount: '', desc: '', date: new Date().toISOString().split('T')[0] });

            const handleSave = (e) => {
                e.preventDefault();
                const t = {
                    id: 'T-' + Date.now(),
                    type, amount: parseFloat(form.amount), description: form.desc, date: form.date,
                    createdAt: new Date().toISOString()
                };
                google.script.run.withSuccessHandler(() => {
                    setShowModal(false);
                    refresh();
                }).saveData('transacoes', t);
            };

            return (
                <div>
                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 32}}>
                        <h1>Financeiro</h1>
                        <div style={{display: 'flex', gap: 8}}>
                            <button className="btn btn-accent" onClick={() => {setType('aporte'); setShowModal(true)}}><lucide.Plus size={18}/> Aporte</button>
                            <button className="btn btn-danger" onClick={() => {setType('retirada'); setShowModal(true)}}><lucide.Minus size={18}/> Retirada</button>
                        </div>
                    </div>

                    <div className="glass-card">
                        <h3>Transações Recentes</h3>
                        <table className="table">
                            <thead>
                                <tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Valor</th></tr>
                            </thead>
                            <tbody>
                                {transactions.sort((a,b) => b.date.localeCompare(a.date)).map(t => (
                                    <tr key={t.id}>
                                        <td>{t.date.split('-').reverse().join('/')}</td>
                                        <td>{t.type === 'aporte' ? <span style={{color: 'var(--accent-400)'}}>Aporte</span> : <span style={{color: 'var(--warn-400)'}}>Retirada</span>}</td>
                                        <td>{t.description}</td>
                                        <td style={{fontWeight: 800}}>{t.type === 'aporte' ? '+' : '-'} {formatCurrency(t.amount)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {showModal && (
                        <div className="modal">
                            <div className="modal-content glass-card">
                                <h2>{type === 'aporte' ? '💰 Novo Aporte' : '💸 Nova Retirada'}</h2>
                                <form onSubmit={handleSave}>
                                    <div className="form-group">
                                        <label className="label">Valor</label>
                                        <input className="input" type="number" step="0.01" required value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label className="label">Descrição</label>
                                        <input className="input" value={form.desc} onChange={e => setForm({...form, desc: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label className="label">Data</label>
                                        <input className="input" type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                    </div>
                                    <div style={{display: 'flex', gap: 8, marginTop: 24}}>
                                        <button className="btn btn-ghost" type="button" onClick={() => setShowModal(false)}>Cancelar</button>
                                        <button className={`btn ${type === 'aporte' ? 'btn-accent' : 'btn-danger'}`} type="submit">Registrar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- UTILITÁRIOS ---
        function formatCurrency(v) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
